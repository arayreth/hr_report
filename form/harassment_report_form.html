<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../style.css">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Déposer une plainte</title>
</head>

<body>

<div class="page-wrapper">
  <div class="header-block">
    <div class="badge">Confidentiel</div>
    <h1>Signaler un comportement déplacé</h1>
    <p class="subtitle">Votre signalement est traité en toute confidentialité</p>
  </div>

  <form method="post" enctype="multipart/form-data">
    <div class="report_form">

      <section>
        <h2><span class="step">01</span> Informations personnelles</h2>

        <div class="name-fields">
          <div class="field">
            <label for="last_name">Nom</label>
            <input type="text" id="last_name" name="last_name" placeholder="Dupont">
          </div>
          <div class="field">
            <label for="first_name">Prénom</label>
            <input type="text" id="first_name" name="first_name" placeholder="Marie">
          </div>
        </div>

        <div class="checkbox-field">
          <input type="checkbox" id="anonymous" name="anonymous">
          <label for="anonymous">Signalement anonyme</label>
        </div>
      </section>

      <section>
        <h2><span class="step">02</span> Détails du signalement</h2>

        <label for="reporting_type">Type de signalement <span class="required">*</span></label>
        <select id="reporting_type" name="reporting_type" required>
          <option value="" disabled selected hidden>Choisissez une option</option>
          <option value="moral_harassment">Harcèlement moral</option>
          <option value="sexual_harassment">Harcèlement sexuel</option>
          <option value="discriminatory_harassment">Harcèlement discriminatoire</option>
          <option value="abuse_of_authority">Abus d'autorité</option>
          <option value="other">Autre</option>
        </select>

        <label for="title">Titre <span class="required">*</span></label>
        <input type="text" id="title" name="title" required placeholder="Objet du signalement">

        <label for="description">Description <span class="required">*</span></label>
        <textarea id="description" name="description" rows="5" required placeholder="Racontez-nous les faits en détails"></textarea>

        <label for="media_proof">Preuve (image, vidéo, PDF)</label>
        <div class="file-wrapper">
          <input id="media_proof" name="media_proof" type="file" accept="image/*,video/*,.pdf">
          <div class="file-label">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>Glissez un fichier ou cliquez pour parcourir</span>
          </div>
        </div>
      </section>

      <button type="submit">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Envoyer le signalement
      </button>

    </div>
  </form>
</div>

</body>
</html>
