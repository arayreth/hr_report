<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Déposer une plainte</title>
</head>

<body>

<h1>Signaler un comportement déplacé</h1>

<form method="post" enctype="multipart/form-data">

<div class="report_form">

<fieldset>
<legend>Informations personnelles</legend>

<label for="last_name">Nom</label><br>
<input type="text" id="last_name" name="last_name"><br>

<label for="first_name">Prénom</label><br>
<input type="text" id="first_name" name="first_name"><br>

<label for="anonymous">Signalement anonyme</label>
<input type="checkbox" id="anonymous" name="anonymous">

</fieldset>

<br>

<fieldset>
<legend>Détails du signalement</legend>

<label for="reporting_type">Type de signalement</label><br>
<select id="reporting_type" name="reporting_type" required>
    <option value="" disabled selected hidden>Choisissez une option</option>
    <option value="moral_harassment">Harcèlement moral</option>
    <option value="sexual_harassment">Harcèlement sexuel</option>
    <option value="discriminatory_harassment">Harcèlement discriminatoire</option>
    <option value="abuse_of_authority">Abus d'autorité</option>
</select>

<br><br>
<label for="title">Titre</label><br>
<input type="text" id="title" name="title" required placeholder="Objet du signalement"></textarea><br>
<label for="description">Description</label><br>
<textarea id="description" name="description" rows="5" required placeholder="Racontez nous les faits en détails"></textarea>

<br><br>

<label for="media_proof">Preuve</label><br>
<input id="media_proof" name="media_proof" type="file" accept="image/*,video/*,.pdf">

</fieldset>

<br>

<button type="submit">Envoyer le signalement</button>

</div>

</form>

</body>
</html>
