<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil – Portail de signalements</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="index-container">
        <h1>Portail de signalements internes</h1>
        <p id="welcome-message">Bienvenue</p>

        <div class="menu">
            <a href="harasement_report_form.html" class="menu-card">
                <h2> Déposer un signalement</h2>
                <p>Signalez un comportement problématique de façon confidentielle ou anonyme.</p>
            </a>

            <div class="menu-card">
                <h2> Suivre mon signalement</h2>
                <p>Consultez l'état de votre dossier grâce à votre code de suivi.</p>
                <input type="text" placeholder="Code de suivi (ex: SIG-2025-034)" style="margin-top:10px; width:100%; padding:8px; box-sizing:border-box;">
                <button style="margin-top:8px;">Rechercher</button>
            </div>
        </div>

        <br>
        <button onclick="logout()">Se déconnecter</button>
        <p id="message"></p>
    </div>

    <script>

      
        // Vérifie si l'utilisateur est connecté
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('welcome-message').textContent = 'Bienvenue, ' + user.email;
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
